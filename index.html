<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoCAD Shortcuts Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --accent: #ff6b00;
      --accent2: #ff9a3c;
      --text: #f0f0f0;
      --muted: #666;
      --muted2: #999;
      --green: #00c896;
      --blue: #3b82f6;
      --purple: #a855f7;
      --pink: #ec4899;
      --yellow: #f59e0b;
      --red: #ef4444;
      --cyan: #06b6d4;
      --teal: #14b8a6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #0d0d0d 0%, #1a0a00 50%, #0d0d0d 100%);
      border-bottom: 1px solid var(--border);
      padding: 28px 20px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      top: -60px; left: 50%; transform: translateX(-50%);
      width: 400px; height: 200px;
      background: radial-gradient(ellipse, rgba(255,107,0,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    h1 span { color: var(--accent); }
    .subtitle {
      font-size: 13px;
      color: var(--muted2);
      margin-bottom: 18px;
      font-weight: 400;
    }

    /* STATS BAR */
    .stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .stat {
      text-align: center;
    }
    .stat-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* SEARCH */
    .search-wrap {
      padding: 16px 16px 0;
      max-width: 700px;
      margin: 0 auto;
    }
    .search-box {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 16px;
      transition: border-color 0.2s;
    }
    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,107,0,0.1);
    }
    .search-icon { color: var(--muted); font-size: 16px; margin-right: 10px; }
    .search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 15px;
      padding: 13px 0;
      font-family: 'Inter', sans-serif;
    }
    .search-box input::placeholder { color: var(--muted); }
    .clear-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 18px; padding: 4px;
      display: none;
    }
    .clear-btn.show { display: block; }

    /* TABS */
    .tabs-wrap {
      padding: 12px 16px;
      max-width: 700px;
      margin: 0 auto;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs-wrap::-webkit-scrollbar { display: none; }
    .tabs {
      display: flex;
      gap: 6px;
      width: max-content;
    }
    .tab {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted2);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .tab:hover { border-color: var(--accent); color: var(--accent); }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .tab .badge {
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 10px;
    }
    .tab:not(.active) .badge {
      background: var(--surface2);
      color: var(--muted);
    }

    /* RESULTS INFO */
    .results-info {
      max-width: 700px;
      margin: 0 auto;
      padding: 4px 16px 8px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .results-info span { color: var(--accent2); font-weight: 600; }

    /* GRID */
    .grid {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 16px 80px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }

    /* CARD */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.15s;
      cursor: default;
    }
    .card:hover {
      border-color: var(--accent);
      background: var(--surface2);
      transform: translateX(2px);
    }
    .key-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(255,107,0,0.1);
      border: 1px solid rgba(255,107,0,0.25);
      border-radius: 6px;
      padding: 5px 10px;
      min-width: 64px;
      text-align: center;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-desc {
      font-size: 12px;
      color: var(--muted2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cat-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* CATEGORY COLORS */
    .cat-Draw { background: var(--green); }
    .cat-Modify { background: var(--blue); }
    .cat-View { background: var(--purple); }
    .cat-Dimension { background: var(--yellow); }
    .cat-Text { background: var(--pink); }
    .cat-Layers { background: var(--cyan); }
    .cat-Measure { background: var(--red); }
    .cat-Snap { background: var(--teal); }
    .cat-General { background: var(--accent); }
    .cat-3D { background: #8b5cf6; }
    .cat-Print { background: #f97316; }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty h3 { font-size: 16px; color: var(--muted2); margin-bottom: 6px; }
    .empty p { font-size: 13px; }

    /* FOOTER */
    .footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 20px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
    }
    .footer span { color: var(--accent); }

    /* SECTION HEADER */
    .section-header {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      padding: 12px 0 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    @media (min-width: 500px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <h1>Auto<span>CAD</span> Shortcuts</h1>
  </div>

</header>

<div class="footer">AutoCAD Shortcuts Pro · <span>Built for professionals</span></div>

const categories = ["All", ...Object.keys(CAT_COLORS)];
let activecat = "All";
let searchQuery = "";

document.getElementById("totalCount").textContent = shortcuts.length;

function getCatCount(cat) {
  if (cat === "All") return shortcuts.length;
  return shortcuts.filter(s => s.cat === cat).length;
}

function renderTabs() {
  document.getElementById("tabs").innerHTML = categories.map(c => `
    <div class="tab ${c === activecat ? 'active' : ''}" onclick="setcat('${c}')">
      ${c} <span class="badge">${getCatCount(c)}</span>
    </div>
  `).join("");
}

function setcat(cat) {
  activecat = cat;
  renderTabs();
  renderCards();
}

function onSearch() {
  searchQuery = document.getElementById("search").value;
  document.getElementById("clearBtn").classList.toggle("show", searchQuery.length > 0);
  renderCards();
}

function clearSearch() {
  document.getElementById("search").value = "";
  searchQuery = "";
  document.getElementById("clearBtn").classList.remove("show");
  renderCards();
}

function renderCards() {
  const q = searchQuery.toLowerCase();
  let data = shortcuts;
  if (activecat !== "All") data = data.filter(s => s.cat === activecat);
  if (q) data = data.filter(s =>
    s.key.toLowerCase().includes(q) ||
    s.title.toLowerCase().includes(q) ||
    s.desc.toLowerCase().includes(q)
  );

  document.getElementById("showCount").textContent = data.length;
  document.getElementById("catLabel").textContent = activecat !== "All" ? activecat : "";

  if (data.length === 0) {
    document.getElementById("grid").innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">🔍</div>
        <h3>No shortcuts found</h3>
        <p>Try a different search term</p>
      </div>`;
    return;
  }

  document.getElementById("grid").innerHTML = data.map(s => `
    <div class="card">
      <div class="key-badge">${s.key}</div>
      <div class="card-info">
        <div class="card-title">${s.title}</div>
        <div class="card-desc">${s.desc}</div>
      </div>
      <div class="cat-dot cat-${s.cat}" title="${s.cat}"></div>
    </div>
  `).join("");
}

renderTabs();
renderCards();
</script>
